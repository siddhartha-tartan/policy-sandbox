<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Policy Portal</title>
    <style id="antiClickjack">
      body {
        display: none !important;
      }
    </style>
    <script type="text/javascript">
      (function () {
        var style = document.getElementById("antiClickjack");
        var allowRendering = function () {
          if (style && style.parentNode) {
            style.parentNode.removeChild(style);
          }
        };

        if (self === top) {
          allowRendering();
          return;
        }

        var isEmbed =
          new URLSearchParams(window.location.search).get("embed") === "1";
        var allowedReferrerRegexes = [
          /^https?:\/\/([a-z0-9-]+\.)*tartanhq\.com(\/|$)/i,
          /^http:\/\/localhost(:\d+)?(\/|$)/i,
          /^http:\/\/127\.0\.0\.1(:\d+)?(\/|$)/i,
        ];
        var allowedReferrer = allowedReferrerRegexes.some(function (regex) {
          return document.referrer && regex.test(document.referrer);
        });

        if (isEmbed || allowedReferrer) {
          allowRendering();
        } else {
          top.location = self.location;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
